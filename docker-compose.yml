services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:0.100
    restart: unless-stopped
    # Gated behind the `signal` profile so non-Signal deployments (Discord, iOS)
    # never start it. The Makefile enables the profile only when a real
    # SIGNAL_NUMBER is configured; combined with penny's `required: false`
    # dependency below, penny starts immediately when this service is absent.
    profiles: [signal]
    ports:
      - "8080:8080"
    volumes:
      - ~/.local/share/signal-cli:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/about > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  penny:
    build:
      context: ./penny
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_MESSAGE: ${GIT_COMMIT_MESSAGE:-unknown}
    image: penny
    restart: unless-stopped
    # `required: false` makes the signal-api gate optional: when the `signal`
    # profile is off (Discord/iOS), signal-api isn't in the project and penny
    # starts without waiting on it. When the profile is on, penny still waits for
    # signal-api to become healthy, so the cold-boot race stays fixed for Signal.
    depends_on:
      signal-api:
        condition: service_healthy
        required: false
    ports:
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./data:/penny/data
      - ./.env:/penny/.env
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    environment:
      - PYTHONUNBUFFERED=1
      - SIGNAL_API_URL=http://signal-api:8080
      - LOG_FILE=/penny/data/penny/logs/penny.log
      - SNAPSHOT=${SNAPSHOT:-0}

  pm:
    build:
      context: .
      dockerfile: penny-team/Dockerfile
    restart: unless-stopped
    profiles: [team]
    command: ["--agent", "product-manager"]
    volumes:
      - ./data:/repo/data
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL=1

  architect:
    build:
      context: .
      dockerfile: penny-team/Dockerfile
    restart: unless-stopped
    profiles: [team]
    command: ["--agent", "architect"]
    volumes:
      - ./data:/repo/data
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL=1

  worker:
    build:
      context: .
      dockerfile: penny-team/Dockerfile
    restart: unless-stopped
    profiles: [team]
    stop_grace_period: 120s
    command: ["--agent", "worker"]
    volumes:
      - ./data:/repo/data
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL=1

  monitor:
    build:
      context: .
      dockerfile: penny-team/Dockerfile
    restart: unless-stopped
    profiles: [team]
    command: ["--agent", "monitor"]
    volumes:
      - ./data:/repo/data
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL=1

  quality:
    build:
      context: .
      dockerfile: penny-team/Dockerfile
    restart: unless-stopped
    profiles: [team]
    command: ["--agent", "quality"]
    volumes:
      - ./data:/repo/data
      - ./github_api:/shared/github_api:ro
      - ./similarity:/shared/similarity:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL=1

  watcher:
    build: ./scripts/watcher
    restart: unless-stopped
    profiles: [team]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    environment:
      - DEPLOY_INTERVAL=300
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-penny}
      - HOST_PROJECT_DIR=${PWD}
    working_dir: /repo
