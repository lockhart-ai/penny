name: client-check

on:
  push:
    branches: [main]
    paths: ["penny-client/**"]
  pull_request:
    branches: [main]
    paths: ["penny-client/**"]

jobs:
  client-check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: |
          if ls -d /Applications/Xcode_26*.app >/dev/null 2>&1; then
            sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"
          fi
          xcodebuild -version

      - run: make client-check
